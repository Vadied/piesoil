steps:
  # Build the container image and tag it with both the commit SHA and latest
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - --tag
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:$COMMIT_SHA'
      - --tag
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest'
      - .

  # Push all tags to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    waitFor: [build]
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}'

  # Run Prisma migrations via Cloud SQL Auth Proxy wrapper before traffic shift
  # exec-wrapper starts Cloud SQL Auth Proxy as a sidecar then runs the given command
  # inside the newly built image against the live database.
  - name: 'gcr.io/google-appengine/exec-wrapper'
    id: migrate
    waitFor: [push]
    args:
      - '-i'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:$COMMIT_SHA'
      - '-s'
      - '$PROJECT_ID:${_REGION}:${_SQL_INSTANCE}'
      - '-e'
      - 'DATABASE_URL=$$DATABASE_URL'
      - '--'
      - 'npx'
      - 'prisma'
      - 'migrate'
      - 'deploy'
    secretEnv: ['DATABASE_URL']

  # Deploy the new revision to Cloud Run (no traffic split — immediate 100%)
  - name: 'gcr.io/cloud-builders/gcloud'
    id: deploy
    waitFor: [migrate]
    args:
      - run
      - deploy
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--quiet'

# Secrets from Secret Manager injected as env vars into the migrate step
availableSecrets:
  secretManager:
    - versionName: 'projects/$PROJECT_ID/secrets/DATABASE_URL/versions/latest'
      env: DATABASE_URL

# Substitution defaults — override these in the Cloud Build trigger settings
substitutions:
  _REGION: europe-west1
  _SERVICE_NAME: app
  _ARTIFACT_REPO: app
  _SQL_INSTANCE: app-db

options:
  logging: CLOUD_LOGGING_ONLY
